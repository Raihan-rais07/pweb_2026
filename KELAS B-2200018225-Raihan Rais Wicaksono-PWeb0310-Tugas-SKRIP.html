<body>

    <h3 align="center">DAFTAR NILAI MAHASISWA</h3>
    
    <table border="1" cellpadding="10" cellspacing="0" align="center" width="80%">
        <tr bgcolor="#CCCCCC">
            <th rowspan="2">No</th>
            <th rowspan="2">NIM</th>
            <th rowspan="2">Nama Mahasiswa</th>
            <th colspan="2">Nilai</th>
        </tr>
        <tr bgcolor="#CCCCCC">
            <th>Teori</th>
            <th>Praktikum</th>
        </tr>
        <tr>
            <td align="center">1</td>
            <td>2100018226</td>
            <td>Alex Martin</td>
            <td align="center">85</td>
            <td align="center">90</td>
        </tr>
        <tr>
            <td align="center">2</td>
            <td>2200018000</td>
            <td>Nama Mahasiswa Lain</td>
            <td align="center">80</td>
            <td align="center">88</td>
        </tr>
        <tr bgcolor="#EEEEEE">
            <td colspan="3" align="center"><b>Rata-rata Nilai Kelas</b></td>
            <td align="center">82.5</td>
            <td align="center">89</td>
        </tr>
    </table>

    <p align="center"><i>Tabel di atas menggunakan kombinasi Rowspan dan Colspan untuk struktur yang lebih kompleks.</i></p>

</body>
</html>
